{% extends "base.html" %}

{% block tools %}
<button class="tool-btn" onclick="resetAll()">重置</button>
{% endblock %}

{% block content %}
<div class="container">
    <div class="page">
        <div class="upload-container">
            <div class="upload-box">
                <div class="upload-title">医学影像上传</div>
                <div class="file-input-row">
                    <label class="file-label">模式:</label>
                    <select id="uploadModeSelect" class="form-select" style="width: auto; flex: 1;">
                        <option value="ncct">1. NCCT-only</option>
                        <option value="ncct_single_cta">2. NCCT + single-phase CTA</option>
                        <option value="ncct_3phase_cta" selected>3. NCCT + mCTA（推荐）</option>
                        <option value="ncct_3phase_cta_ctp">4. NCCT + mCTA + CTP</option>
                    </select>
                </div>
                <div class="file-input-row" id="ctaPhaseRow" style="display:none;">
                    <label class="file-label">CTA期相:</label>
                    <select id="ctaPhaseSelect" class="form-select" style="width: auto; flex: 1;">
                        <option value="mcta">动脉期CTA</option>
                        <option value="vcta">静脉期CTA</option>
                        <option value="dcta">延迟期CTA</option>
                    </select>
                </div>
                <div class="file-input-row">
                    <label class="file-label">NCCT:</label>
                    <input type="file" id="ncctFile" class="file-input" accept=".nii,.nii.gz,.gz,application/gzip,application/x-gzip">
                    <button class="file-select" id="ncctBtn" onclick="document.getElementById('ncctFile').click()">选择文件...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">CBF:</label>
                    <input type="file" id="cbfFile" class="file-input" accept=".nii,.nii.gz,.gz,application/gzip,application/x-gzip">
                    <button class="file-select" id="cbfBtn" onclick="document.getElementById('cbfFile').click()">选择文件...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">CBV:</label>
                    <input type="file" id="cbvFile" class="file-input" accept=".nii,.nii.gz,.gz,application/gzip,application/x-gzip">
                    <button class="file-select" id="cbvBtn" onclick="document.getElementById('cbvFile').click()">选择文件...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">Tmax:</label>
                    <input type="file" id="tmaxFile" class="file-input" accept=".nii,.nii.gz,.gz,application/gzip,application/x-gzip">
                    <button class="file-select" id="tmaxBtn" onclick="document.getElementById('tmaxFile').click()">选择文件...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">动脉期CTA:</label>
                    <input type="file" id="mctaFile" class="file-input" accept=".nii,.nii.gz,.gz,application/gzip,application/x-gzip">
                    <button class="file-select" id="mctaBtn" onclick="document.getElementById('mctaFile').click()">选择文件...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">静脉期CTA:</label>
                    <input type="file" id="vctaFile" class="file-input" accept=".nii,.nii.gz,.gz,application/gzip,application/x-gzip">
                    <button class="file-select" id="vctaBtn" onclick="document.getElementById('vctaFile').click()">选择文件...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">延迟期CTA:</label>
                    <input type="file" id="dctaFile" class="file-input" accept=".nii,.nii.gz,.gz,application/gzip,application/x-gzip">
                    <button class="file-select" id="dctaBtn" onclick="document.getElementById('dctaFile').click()">选择文件...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">偏侧:</label>
                    <select id="sideSelect" class="form-select" style="width: auto; flex: 1;">
                        <option value="both">双侧</option>
                        <option value="left">左侧</option>
                        <option value="right">右侧</option>
                    </select>
                </div>
                <div class="file-input-row">
                    <label class="file-label">模型:</label>
                    <select id="modelSelect" class="form-select" style="width: auto; flex: 1;">
                        <option value="palette">palette</option>
                        <option value="mrdpm" selected>mrdpm（推荐）</option>
                    </select>
                </div>
                <div class="file-input-row" style="align-items:flex-start;">
                    <label class="file-label">任务:</label>
                    <textarea
                        id="agentQuestion"
                        class="form-select"
                        style="width: auto; flex: 1; min-height: 78px; resize: vertical;"
                        placeholder="请描述本次诊疗目标，例如评估可挽救脑组织并给出下一步建议。"
                    ></textarea>
                </div>
                <div class="file-input-row upload-switch-row">
                    <label class="file-label">Agent:</label>
                    <label class="upload-switch" for="agentRunToggle">
                        <input type="checkbox" id="agentRunToggle" checked>
                        <span>启用 Agent 主链（默认开启）</span>
                    </label>
                </div>
                <button class="upload-btn" id="uploadBtn" onclick="processFiles()" disabled>开始处理</button>
                <div id="agentRunInfo" class="upload-agent-note" style="display:none;"></div>
                <div class="upload-info">
                    支持格式: NIfTI (.nii, .nii.gz)<br>
                    单文件建议不超过 100MB<br>
                    CBF/CBV/Tmax 同时上传时视为真实 CTP，不触发伪彩 CTP 生成。
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/upload.js"></script>
{% endblock %}
