{% extends "base.html" %}

{% block tools %}
<button class="tool-btn" onclick="resetAll()">重新开始</button>
{% endblock %}

{% block content %}
<div class="container">
    <div class="page">
        <div class="upload-container">
            <div class="upload-box">
                <div class="upload-title">上传医学影像文件</div>
                <div class="file-input-row">
                    <label class="file-label">NCCT文件:</label>
                    <input type="file" id="ncctFile" class="file-input" accept=".nii,.nii.gz">
                    <button class="file-select" id="ncctBtn" onclick="document.getElementById('ncctFile').click()">选择文件（必选）...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">CBF:</label>
                    <input type="file" id="cbfFile" class="file-input" accept=".nii,.nii.gz">
                    <button class="file-select" id="cbfBtn" onclick="document.getElementById('cbfFile').click()">选择文件（可选）...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">CBV:</label>
                    <input type="file" id="cbvFile" class="file-input" accept=".nii,.nii.gz">
                    <button class="file-select" id="cbvBtn" onclick="document.getElementById('cbvFile').click()">选择文件（可选）...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">Tmax:</label>
                    <input type="file" id="tmaxFile" class="file-input" accept=".nii,.nii.gz">
                    <button class="file-select" id="tmaxBtn" onclick="document.getElementById('tmaxFile').click()">选择文件（可选）...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">动脉期CTA:</label>
                    <input type="file" id="mctaFile" class="file-input" accept=".nii,.nii.gz">
                    <button class="file-select" id="mctaBtn" onclick="document.getElementById('mctaFile').click()">选择文件（可选）...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">静脉期CTA:</label>
                    <input type="file" id="vctaFile" class="file-input" accept=".nii,.nii.gz">
                    <button class="file-select" id="vctaBtn" onclick="document.getElementById('vctaFile').click()">选择文件（可选）...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">延迟期CTA:</label>
                    <input type="file" id="dctaFile" class="file-input" accept=".nii,.nii.gz">
                    <button class="file-select" id="dctaBtn" onclick="document.getElementById('dctaFile').click()">选择文件（可选）...</button>
                </div>
                <div class="file-input-row">
                    <label class="file-label">偏侧选择:</label>
                    <select id="sideSelect" class="form-select" style="width: auto; flex: 1;">
                        <option value="both">双侧</option>
                        <option value="left">左侧</option>
                        <option value="right">右侧</option>
                    </select>
                </div>
                <div class="file-input-row">
                    <label class="file-label">模型选择:</label>
                    <select id="modelSelect" class="form-select" style="width: auto; flex: 1;">
                        <option value="palette">palette模型</option>
                        <option value="mrdpm" selected>mrdpm模型 (默认)</option>
                    </select>
                </div>
                <button class="upload-btn" id="uploadBtn" onclick="processFiles()" disabled>开始处理</button>
                <div class="upload-info">
                    支持格式: NIfTI (.nii, .nii.gz)<br>
                    文件大小: 最大 100MB<br>
                    可选上传: CBF、CBV、Tmax（MCTP功能图像），如上传则直接显示，无需AI分析<br>
                    系统将自动生成: RGB合成、脑部掩码、AI灌注图(CBF/CBV/Tmax)
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/upload.js"></script>
{% endblock %}
