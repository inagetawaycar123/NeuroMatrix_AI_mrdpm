{% extends "base.html" %}

{% block tools %}
<button class="tool-btn" onclick="resetForm()">重置表单</button>
<button class="tool-btn primary" onclick="submitPatientBasicInfo()">提交存储</button>
{% endblock %}

{% block content %}
<div class="container">
    <div class="page">
        <div class="info-box">
            <div class="info-title">脑卒中患者核心信息录入</div>
            <form id="patientForm">
                <div class="form-group">
                    <div class="group-title">👤 患者基础信息</div>
                    <div class="form-grid">
                        <div class="form-item"><label class="form-label required">姓名</label><input type="text" id="patient_name" class="form-input" required></div>
                        <div class="form-item"><label class="form-label required">年龄</label><input type="number" id="patient_age" class="form-input" min="0" max="120" required></div>
                        <div class="form-item"><label class="form-label required">性别</label><select id="patient_sex" class="form-select" required><option value="">请选择</option><option value="男">男</option><option value="女">女</option></select></div>
                    </div>
                </div>
                <div class="form-group">
                    <div class="group-title">⏱️ 病程时间信息</div>
                    <div class="form-grid form-grid-2">
                        <div class="form-item"><label class="form-label required">发病精确时间</label><input type="datetime-local" id="onset_exact_time" class="form-input" required></div>
                        <div class="form-item"><label class="form-label required">入院时间</label><input type="datetime-local" id="admission_time" class="form-input" required></div>
                    </div>
                    <div class="form-item" style="margin-top:12px;"><label class="form-label required">入院到发病时间差</label><input type="text" id="surgery_time" class="form-input" readonly value="选择时间后自动计算"></div>
                </div>
                <div class="form-group">
                    <div class="group-title">📊 入院NIHSS评分</div>
                    <div class="form-grid">
                        <div class="form-item"><label class="form-label required">评分 (0-42)</label><input type="number" id="admission_nihss" class="form-input" min="0" max="42" required></div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/patient.js"></script>
{% endblock %}
